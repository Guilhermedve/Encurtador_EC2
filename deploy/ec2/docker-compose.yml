name: encurtador-ec2

services:
  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    pull_policy: always
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      FRONTEND_URL: https://${DOMAIN_NAME:?DOMAIN_NAME is required}
      PUBLIC_BASE_URL: https://${DOMAIN_NAME}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-10}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      TRUST_PROXY: "true"
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://127.0.0.1:3000/health').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    networks:
      - app

  caddy:
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    networks:
      - app

  watchtower:
    image: nickfedor/watchtower:1.20.1
    restart: unless-stopped
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_SECONDS:-300}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      com.centurylinklabs.watchtower.enable: "false"

volumes:
  caddy_data:
  caddy_config:

networks:
  app:
    driver: bridge
